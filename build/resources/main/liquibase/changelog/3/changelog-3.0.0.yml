databaseChangeLog:
  - changeSet:
      id: create-reservations-table
      author: Aytac Huseynzada
      changes:
        - createTable:
            tableName: reservations
            schemaName: public
            columns:

              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT

              - column:
                  name: movie_id
                  type: BIGINT

              - column:
                  name: status
                  type: VARCHAR(20)

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: approved_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: reservations
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_reservation_user

        - addForeignKeyConstraint:
            baseTableName: reservations
            baseColumnNames: movie_id
            referencedTableName: movies
            referencedColumnNames: id
            constraintName: fk_reservation_movie